version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: ecommerce-server:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - '5000:5000'
    command: >
      sh -c "npx prisma migrate deploy && node index.js"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: ecommerce-client:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - '3000:3000'
    depends_on:
      - server
