name: E-Commerce

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # Install backend dependencies
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      # Install frontend dependencies
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      # Lint server
      - name: Lint server
        working-directory: ./server
        run: npm run lint || echo "No server lint script"

      # Lint client
      - name: Lint client
        working-directory: ./client
        run: npm run lint || echo "No client lint script"

      # Test server
      - name: Test server
        working-directory: ./server
        run: npm test || echo "No server test script"

      # Test client
      - name: Test client
        working-directory: ./client
        run: npm test || echo "No client test script"
