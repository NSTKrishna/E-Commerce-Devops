name: E-Commerce CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

# ─────────────────────────────────────────────────────────────────────────────
# Phase 1 — Testing
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Phase 1 — Testing
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # ── Install Dependencies ──────────────────────────────────────────────
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      # ── Quality Checks (Lint) ─────────────────────────────────────────────
      - name: Lint server
        working-directory: ./server
        run: npm run lint

      - name: Lint client
        working-directory: ./client
        run: npm run lint

      # ── Database Sync ─────────────────────────────────────────────────────
      - name: Sync database schema
        working-directory: ./server
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/test_db
          DIRECT_URL: postgresql://user:password@localhost:5432/test_db

      # ── Unit & Integration Tests ──────────────────────────────────────────
      - name: Run server tests
        working-directory: ./server
        run: npm test -- --ci --reporters=default --reporters=jest-junit
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/test_db
          DIRECT_URL: postgresql://user:password@localhost:5432/test_db
          JWT_SECRET: test_secret_key
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: server-test-results.xml

      - name: Run client tests
        working-directory: ./client
        run: npm test

      # ── Upload Test Reports ───────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: server/reports/
          retention-days: 30

      # ── Client Build Verification ─────────────────────────────────────────
      - name: Build client
        working-directory: ./client
        run: npm run build

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 2 — Infrastructure Provisioning (Terraform)
  # ───────────────────────────────────────────────────────────────────────────
  terraform:
    name: Phase 2 — Terraform
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.0

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -upgrade

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Create Terraform variables
        working-directory: ./terraform
        run: |
          echo 'subnet_ids = ${{ secrets.AWS_SUBNET_IDS }}' > ci.auto.tfvars

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 3 — Container Build & Push to ECR
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Phase 3 — Docker Build & Push
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push server image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/ecommerce-server:latest \
                       -t $ECR_REGISTRY/ecommerce-server:$IMAGE_TAG \
                       -f Dockerfile.server .
          docker push $ECR_REGISTRY/ecommerce-server:latest
          docker push $ECR_REGISTRY/ecommerce-server:$IMAGE_TAG

      - name: Build & push client image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/ecommerce-client:latest \
                       -t $ECR_REGISTRY/ecommerce-client:$IMAGE_TAG \
                       -f Dockerfile.client .
          docker push $ECR_REGISTRY/ecommerce-client:latest
          docker push $ECR_REGISTRY/ecommerce-client:$IMAGE_TAG

  # ───────────────────────────────────────────────────────────────────────────
  # Phase 4 — Deploy to ECS Fargate
  # ───────────────────────────────────────────────────────────────────────────
  deploy-ecs:
    name: Phase 4 — Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy server to ECS
        run: |
          aws ecs update-service \
            --cluster ecommerce-cluster \
            --service ecommerce-server-service \
            --force-new-deployment

      - name: Deploy client to ECS
        run: |
          aws ecs update-service \
            --cluster ecommerce-cluster \
            --service ecommerce-client-service \
            --force-new-deployment

      - name: Wait for server service stability
        run: |
          aws ecs wait services-stable \
            --cluster ecommerce-cluster \
            --services ecommerce-server-service

      - name: Wait for client service stability
        run: |
          aws ecs wait services-stable \
            --cluster ecommerce-cluster \
            --services ecommerce-client-service

      - name: Verify services are running
        run: |
          echo "=== Server Service ==="
          aws ecs describe-services \
            --cluster ecommerce-cluster \
            --services ecommerce-server-service \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}' \
            --output table

          echo "=== Client Service ==="
          aws ecs describe-services \
            --cluster ecommerce-cluster \
            --services ecommerce-client-service \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}' \
            --output table
